# ── Base de données MySQL ──────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bibliotheque_unz?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=VotreMotDePasse
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Serveur ────────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=bibliotheque-unz

# ── JWT ────────────────────────────────────────────────────────────────────────
jwt.secret=VotreCleSecreteTresLonguePourJWTMinimum256bitsIciMettreLaCle
jwt.expiration=86400000

# ── Email (Gmail) ──────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=votre.email@gmail.com
spring.mail.password=VotreMotDePasseApp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Thymeleaf ──────────────────────────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ── Logs ───────────────────────────────────────────────────────────────────────
logging.level.com.unz=DEBUG
logging.level.org.springframework.security=INFO
