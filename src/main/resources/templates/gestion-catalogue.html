<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliothèque UNZ — Gestion Catalogue</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Sans+3:wght@300;400;600&display=swap');
        :root { --sidebar-w: 260px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Source Sans 3', sans-serif; background: #F0F4F8; display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-w); background: linear-gradient(180deg, #0D47A1 0%, #00695C 100%); position: fixed; height: 100vh; left: 0; top: 0; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; }
        .sidebar-logo { font-size: 28px; }
        .sidebar-title { font-family: 'Merriweather', serif; font-size: 16px; color: white; }
        .sidebar-subtitle { font-size: 11px; color: rgba(255,255,255,0.6); }
        .sidebar-nav { flex: 1; padding: 20px 0; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.8); text-decoration: none; transition: all 0.2s; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.15); color: white; padding-left: 25px; }
        .nav-item i { width: 20px; text-align: center; }
        .sidebar-footer { padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn-logout { width: 100%; padding: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: rgba(255,255,255,0.8); font-size: 13px; cursor: pointer; }
        .main-content { margin-left: var(--sidebar-w); flex: 1; padding: 30px; }
        .page-title { font-family: 'Merriweather', serif; font-size: 24px; color: #0D47A1; margin-bottom: 6px; }
        .page-subtitle { font-size: 13px; color: #888; margin-bottom: 25px; }

        /* FORM */
        .form-card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 2px 15px rgba(0,0,0,0.05); max-width: 700px; }
        .form-section { margin-bottom: 28px; }
        .form-section-title { font-family: 'Merriweather', serif; font-size: 15px; color: #0D47A1; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #E3F2FD; display: flex; align-items: center; gap: 8px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: #666; margin-bottom: 8px; display: block; font-weight: 600; }
        .form-control { width: 100%; border: 2px solid #E8E8E8; border-radius: 10px; padding: 12px 14px; font-size: 13px; font-family: 'Source Sans 3', sans-serif; transition: all 0.3s; }
        .form-control:focus { outline: none; border-color: #0D47A1; box-shadow: 0 0 0 3px rgba(13,71,161,0.1); }
        textarea.form-control { min-height: 100px; resize: vertical; }
        .form-actions { display: flex; gap: 12px; margin-top: 24px; }
        .btn-sauvegarder { flex: 1; padding: 14px; background: linear-gradient(135deg, #0D47A1, #00695C); border: none; border-radius: 12px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-sauvegarder:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(13,71,161,0.3); }
        .btn-annuler { padding: 14px 24px; background: #F0F0F0; border: none; border-radius: 12px; color: #666; font-size: 14px; cursor: pointer; text-decoration: none; display: flex; align-items: center; }
        .required-star { color: #C62828; margin-left: 3px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">📚</div>
            <div>
                <div class="sidebar-title">BiblioUNZ</div>
                <div class="sidebar-subtitle">Université Norbert Zongo</div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="/accueil" class="nav-item"><i class="fas fa-home"></i> Tableau de bord</a>
            <a href="/catalogue" class="nav-item"><i class="fas fa-book"></i> Catalogue</a>
            <a href="/emprunts" class="nav-item"><i class="fas fa-exchange-alt"></i> Emprunts</a>
            <a href="/bibliothecaire/catalogue" class="nav-item active"><i class="fas fa-plus-circle"></i> Gérer Catalogue</a>
            <a href="/admin/utilisateurs" class="nav-item"><i class="fas fa-users"></i> Utilisateurs</a>
            <a href="/admin/statistiques" class="nav-item"><i class="fas fa-chart-bar"></i> Statistiques</a>
        </nav>
        <div class="sidebar-footer">
            <form th:action="@{/deconnexion}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-logout"><i class="fas fa-sign-out-alt me-1"></i> Déconnexion</button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <div class="page-title" th:text="${ouvrage.id != null ? 'Modifier l\'ouvrage' : 'Ajouter un ouvrage'}">Ajouter un ouvrage</div>
        <div class="page-subtitle">Remplissez les informations de l'ouvrage</div>

        <div class="form-card">
            <form th:action="${ouvrage.id != null ? '/api/ouvrages/' + ouvrage.id : '/api/ouvrages'}"
                  method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:if="${ouvrage.id != null}" name="_method" value="PUT"/>

                <!-- Informations principales -->
                <div class="form-section">
                    <div class="form-section-title">
                        <i class="fas fa-info-circle"></i> Informations principales
                    </div>
                    <div class="form-group">
                        <label class="form-label">Titre <span class="required-star">*</span></label>
                        <input type="text" name="titre" class="form-control"
                               placeholder="Ex: Algorithmes et Programmation"
                               th:value="${ouvrage.titre}" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">ISBN</label>
                            <input type="text" name="isbn" class="form-control"
                                   placeholder="Ex: 978-0-123456-78-9"
                                   th:value="${ouvrage.isbn}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Année de publication</label>
                            <input type="number" name="anneePublication" class="form-control"
                                   placeholder="Ex: 2023" min="1900" max="2026"
                                   th:value="${ouvrage.anneePublication}">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Nombre d'exemplaires <span class="required-star">*</span></label>
                            <input type="number" name="nbExemplaires" class="form-control"
                                   placeholder="Ex: 3" min="1" required
                                   th:value="${ouvrage.nbExemplaires ?: 1}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Catégorie</label>
                            <select name="categorieId" class="form-control">
                                <option value="">-- Sélectionner une catégorie --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.nom}"
                                        th:selected="${ouvrage.categorie?.id == cat.id}">
                                </option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Description -->
                <div class="form-section">
                    <div class="form-section-title">
                        <i class="fas fa-align-left"></i> Description
                    </div>
                    <div class="form-group">
                        <label class="form-label">Résumé / Description</label>
                        <textarea name="description" class="form-control"
                                  placeholder="Décrivez le contenu de l'ouvrage..."
                                  th:text="${ouvrage.description}"></textarea>
                    </div>
                </div>

                <!-- Actions -->
                <div class="form-actions">
                    <button type="submit" class="btn-sauvegarder">
                        <i class="fas fa-save me-2"></i>
                        <span th:text="${ouvrage.id != null ? 'Sauvegarder les modifications' : 'Ajouter l\'ouvrage'}">Sauvegarder</span>
                    </button>
                    <a href="/catalogue" class="btn-annuler">
                        <i class="fas fa-times me-1"></i> Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
